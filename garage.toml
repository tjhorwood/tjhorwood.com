# Garage single-node S3-compatible object storage for Payload media.
# Secrets are supplied via compose environment variables from .env.
replication_factor = 1
consistency_mode = "consistent"

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
metadata_fsync = true
data_fsync = false

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region = "garage"
root_domain = ".s3.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
metrics_require_token = true
