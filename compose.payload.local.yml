services:
  postgres:
    image: postgres:16-alpine
    container_name: tjhorwood-payload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tjhorwood_payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_dev_password
    ports:
      - '5432:5432'
    volumes:
      - payload_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d tjhorwood_payload']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  payload_postgres_data:
